# Render Blueprint — deploys this app as a free web service.
# On Render: New + -> Blueprint -> pick this repo. Render reads this file and
# provisions everything below automatically.
services:
  - type: web
    name: organ-network
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY        # a strong random secret, generated by Render
        generateValue: true
      - key: SEED_DEMO         # seed the demo admin + hospitals on first boot
        value: "1"
