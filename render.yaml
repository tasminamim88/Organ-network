services:
  - type: web
    name: organ-network
    runtime: python
    rootDir: organ-network
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SEED_DEMO
        value: "1"
